name: Import Saved Tracker Files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"
  push:
    paths:
      - "marvel_rivals_stats_db/imports/**"
      - "marvel_rivals_stats_db/rivals_stats_db.py"
      - "marvel_rivals_stats_db/schema.sql"
      - "marvel_rivals_stats_db/requirements.txt"
      - ".github/workflows/import-saved-tracker-files.yml"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: marvel_rivals_stats_db
        run: python -m pip install -r requirements.txt

      - name: Import saved files and refresh CSV
        working-directory: marvel_rivals_stats_db
        run: |
          python rivals_stats_db.py import-folder imports
          python rivals_stats_db.py report --export-csv matches_export.csv

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marvel_rivals_stats_db/marvel_rivals.sqlite3 marvel_rivals_stats_db/matches_export.csv
          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "Update Marvel Rivals stats database"
            git push
          fi
